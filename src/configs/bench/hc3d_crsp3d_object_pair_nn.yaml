defaults:
  - platform: default
  - dataset: hc3d

#platform:
#  deps:
#    - diff3f     # available: densematcher, diff3f
#    #                   # creates venv_py310_cu124_torch26_densematcher and installs deps there

method:
  class_name: DefaultMethod

task:
  class_name: Crsp3DNNTask

bench:
  class_name: ObjectPairBench
  batch_size: 4

wandb:
  project: hc3d_eval

dataset:
  class_name: HouseCorr3D
  item_type: object_pair
  mesh_type: "mc16_vuni100_r256_fdinov2s"

  filter_has_kpts: true
  filter_is_real: false

  categories:       # null = all categories; list strings to restrict, e.g.:
    - hair_dryer
    # - mug

  object_modalities:
    - mesh
    - obj_ncds0c_tform4x4_obj
    - obj_kpts3d
    - category
    - verts3d
    - verts3d_feats

  obj_tform4x4:
  - [ 0.00000,  0.00000,  1.00000,  0.00000]
  - [ 0.00000,  1.00000,  0.00000,  0.00000]
  - [-1.00000, -0.00000, -0.00000,  0.00000]
  - [ 0.00000,  0.00000,  0.00000,  1.00000]

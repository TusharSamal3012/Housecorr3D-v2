dataset:
  mesh_type: "mc16_vuni4_r256_fdiff3f"
  # Must be nested under `extra:`, not a bare top-level dataset key: DatasetConfig
  # (third_party/o3b/src/o3b/dataset/dataset.py) only recognizes a fixed, explicit
  # set of top-level yaml keys in from_dict() — anything else is silently dropped,
  # it does NOT fall through to `extra`. `extra` is populated only from yaml's own
  # `extra:` sub-block (see hc3d.yaml/dm.yaml's `extra: {image_size: [...]}` for
  # the existing precedent this follows).
  extra:
    feats_aggregation_mode: "all_views"

  # OmegaConf.merge replaces lists wholesale, so this must repeat the base
  # bench config's object_modalities (hc3d_crsp3d_object_pair_nn.yaml) plus
  # the one new entry — not just the new entry on its own.
  object_modalities:
    - mesh
    - obj_ncds0c_tform4x4_obj
    - obj_kpts3d
    - category
    - verts3d
    - verts3d_feats
    - verts3d_feats_all_views
